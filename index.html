<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GHC Timer"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#091e48"/>
<title>GHC Wedstrijdtimer</title>
<style>
:root {
  --navy:#12345f; --panel:rgba(255,255,255,0.10);
  --panel-border:rgba(255,255,255,0.22);
  --light-pill:rgba(220,235,255,0.12);
  --sub-color:#4a90d9; --toggle-bg:rgba(8,20,60,0.80);
  --ring-blue:#3a8fff; --ring-red:#e03030;
  --logo-filter:brightness(0) saturate(100%) invert(12%) sepia(60%) saturate(700%) hue-rotate(200deg) brightness(80%);
}
body.dark {
  --navy:#f0f5ff;
  --logo-filter:brightness(0) invert(1);
  --sub-color:rgba(180,215,255,0.80);
  --toggle-bg:rgba(255,255,255,0.10);
}
* { box-sizing:border-box; }
html,body { margin:0; width:100%; height:100%; overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  color:var(--navy); -webkit-tap-highlight-color:transparent; }

/* ── STADION ACHTERGROND ── */
body {
  background:
    radial-gradient(ellipse 50% 80% at -8% 5%, rgba(255,255,255,0.22) 0%, transparent 55%),
    radial-gradient(ellipse 50% 80% at 108% 5%, rgba(255,255,255,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 85% 45% at 50% -2%, rgba(140,200,255,0.50) 0%, transparent 58%),
    linear-gradient(175deg, #1a4a8e 0%, #0e2f6a 22%, #091e48 52%, #050d22 100%);
}
body.dark {
  background:
    radial-gradient(ellipse 50% 80% at -8% 5%, rgba(60,120,255,0.15) 0%, transparent 55%),
    radial-gradient(ellipse 50% 80% at 108% 5%, rgba(50,100,200,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 85% 45% at 50% -2%, rgba(60,100,200,0.32) 0%, transparent 58%),
    linear-gradient(175deg, #0d1e3e 0%, #08142a 50%, #040d1c 100%);
}
body::before {
  content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,0.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.06) 1px,transparent 1px);
  background-size:40px 40px;
}
body::after {
  content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:radial-gradient(ellipse 100% 45% at 50% 110%, rgba(0,0,0,0.50) 0%, transparent 65%);
}

/* ── APP GRID ── */
.app {
  position:relative; z-index:1; height:100dvh;
  padding:max(10px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));
  display:grid; gap:8px;
  grid-template-rows:auto auto minmax(0,1fr) auto auto;
  grid-template-areas:'header' 'quarters' 'timer' 'controls' 'footer';
}

/* ── HEADER — Vision Pro glas ── */
.header {
  grid-area:header;
  display:grid; grid-template-columns:auto 1fr auto;
  gap:10px; align-items:center; padding:5px 10px;
  background:rgba(255,255,255,0.10);
  border:1px solid rgba(255,255,255,0.22);
  border-radius:18px;
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.28), 0 8px 32px rgba(0,0,20,0.28);
}
.logoBox { width:clamp(38px,9vw,54px); height:clamp(38px,9vw,54px); flex-shrink:0; display:grid; place-items:center; }
.logoBox img { width:100%; height:100%; object-fit:contain; }
.brandText { min-width:0; padding-left:2px; }
.brandTitle {
  margin:0; color:var(--navy); font-weight:900; text-transform:uppercase;
  letter-spacing:0.12em; font-size:clamp(1.0rem,4.2vw,1.9rem); white-space:nowrap; line-height:1;
}
.brandSub {
  margin-top:4px; color:rgba(255,255,255,0.88); font-weight:700;
  text-transform:uppercase; letter-spacing:0.28em;
  font-size:clamp(0.50rem,1.6vw,0.72rem);
}
.themeToggle {
  border:1px solid rgba(255,255,255,0.20);
  background:var(--toggle-bg); color:#fff;
  border-radius:999px; padding:6px 12px 6px 9px; min-height:32px;
  font-size:0.62rem; font-weight:900; letter-spacing:0.16em; text-transform:uppercase;
  cursor:pointer; touch-action:manipulation; display:flex; align-items:center; gap:5px;
  backdrop-filter:blur(12px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.18);
}
.themeToggle::before { content:"🌙"; font-size:0.88rem; }

/* ── KWARTEN — glas card ── */
.quarters {
  grid-area:quarters;
  display:grid; grid-template-columns:1fr 1fr;
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.16);
  border-radius:18px;
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.18), 0 8px 28px rgba(0,0,20,0.22);
  padding:8px 4px 10px;
}
.half { display:flex; flex-direction:column; align-items:center; gap:8px; padding:0 8px; position:relative; }
.half:first-child { border-right:1px solid rgba(255,255,255,0.14); }
.halfTitle {
  width:100%; text-align:center; font-size:clamp(0.56rem,1.7vw,0.76rem);
  font-weight:800; letter-spacing:0.20em; text-transform:uppercase;
  color:rgba(255,255,255,0.72); padding-bottom:6px;
  display:flex; align-items:center; justify-content:center; gap:5px; position:relative;
}
.halfTitle::before,.halfTitle::after { content:"—"; opacity:0.28; font-weight:300; }
.halfTitle>span.ul { position:absolute; bottom:0; left:15%; right:15%; height:2px; border-radius:1px; background:rgba(255,255,255,0.08); }
.half:first-child .halfTitle>span.ul { background:rgba(255,255,255,0.55); }
.qrow { display:flex; justify-content:center; gap:10px; width:100%; }
.qbtn {
  width:clamp(54px,10.5vw,76px); height:clamp(54px,10.5vw,76px);
  border-radius:50%;
  background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.48);
  font-weight:900; font-size:clamp(0.88rem,2.2vw,1.28rem);
  display:grid; place-items:center;
  cursor:pointer; touch-action:manipulation; user-select:none;
  transition:all .10s ease; position:relative;
  backdrop-filter:blur(8px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.18), 0 4px 14px rgba(0,0,0,0.22);
}
.qbtn.active {
  background:rgba(255,255,255,0.90); color:#0d1f3c;
  border-color:rgba(255,255,255,0.95);
  box-shadow:0 0 0 3px rgba(255,255,255,0.25), 0 6px 20px rgba(255,255,255,0.30),
    inset 0 1px 0 rgba(255,255,255,0.45);
  transform:translateY(-1px);
}
.qbtn.active::after {
  content:""; position:absolute; bottom:7px; left:50%; transform:translateX(-50%);
  width:14px; height:2px; border-radius:1px; background:rgba(13,31,60,0.5);
}

/* ── TIMER — deep glass ── */
.timer {
  grid-area:timer;
  background:
    radial-gradient(circle 46% at 50% 50%, transparent 0%, transparent 44%, rgba(255,255,255,0.07) 60%, rgba(255,255,255,0.10) 100%),
    radial-gradient(ellipse 85% 65% at 50% 0%, rgba(50,110,255,0.18) 0%, transparent 65%),
    linear-gradient(160deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.08) 100%),
    rgba(14,30,72,0.88);
  border:1px solid rgba(255,255,255,0.16);
  border-radius:28px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.65),
    0 28px 70px rgba(0,0,0,0.75),
    inset 0 1px 0 rgba(255,255,255,0.16),
    inset 0 -1px 0 rgba(0,0,0,0.35);
  display:flex; align-items:center; justify-content:center;
  padding:10px; min-height:0; overflow:hidden; position:relative;
  container-type:size;
  backdrop-filter:blur(20px);
}
.timer::before {
  content:""; position:absolute; inset:0; border-radius:26px;
  background:repeating-linear-gradient(-45deg,transparent,transparent 18px,rgba(255,255,255,0.014) 18px,rgba(255,255,255,0.014) 36px);
  pointer-events:none; z-index:0;
}
.timer::after {
  content:""; position:absolute; top:0; left:12%; right:12%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.38),transparent);
  z-index:2; pointer-events:none;
}
.timerInner { position:relative; z-index:1; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }

/* ── RING ── */
.ringWrap { position:relative; aspect-ratio:1; max-width:100%; max-height:100%; flex:0 1 auto; display:flex; align-items:center; justify-content:center; }
@container (min-width:1px) { .ringWrap { width:min(calc(100cqw - 8px),calc(100cqh - 8px)); } }
.ringWrap svg { position:absolute; inset:0; width:100%; height:100%; transform:rotate(-90deg); overflow:visible; }
.ringCenter {
  position:relative; z-index:1; width:78%;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center; gap:4px;
  margin-top:2%;
}

/* Ring logo */
.ringLogo {
  position:absolute;
  top:18%;
  left:50%;
  transform:translateX(-50%);
  width:clamp(48px,19cqw,130px);
  height:clamp(48px,19cqw,130px);
  object-fit:contain;
  opacity:0.70;
  z-index:2;
}

/* Hockey sticks */


.time {
  margin:0; font-size:clamp(2.4rem,28cqw,14rem); line-height:0.90;
  font-weight:900; letter-spacing:-0.03em; color:#ffffff;
  font-variant-numeric:tabular-nums; white-space:nowrap;
  text-shadow:0 0 30px rgba(255,255,255,0.55), 0 2px 8px rgba(0,0,0,0.50);
  transition:color .3s ease;
}
.time.warn { color:#ff4040!important; text-shadow:0 2px 20px rgba(255,60,60,0.65); }
@keyframes blink-warn { 0%,100%{opacity:1;} 50%{opacity:0.22;} }
.time.blink { animation:blink-warn 0.75s ease-in-out infinite; }
.meta { font-size:clamp(0.52rem,1.9cqw,0.92rem); letter-spacing:0.06em; color:rgba(255,255,255,0.92); font-weight:700; font-variant-numeric:tabular-nums; white-space:nowrap; text-align:center; }
.meta strong { color:#ffffff; font-weight:900; }

/* ── KNOPPEN — Vision Pro glas ── */
.controls { grid-area:controls; display:grid; grid-template-columns:2fr 1fr; gap:10px; }
button { border:none; border-radius:16px; padding:0 16px; font:inherit; font-weight:900; letter-spacing:0.14em; text-transform:uppercase; cursor:pointer; touch-action:manipulation; min-height:52px; display:flex; align-items:center; justify-content:center; gap:10px; font-size:clamp(0.76rem,2.1vw,0.94rem); }
.primary { background:linear-gradient(160deg,#26b844 0%,#1a8c34 55%,#115e22 100%); color:#fff;
  border:1px solid rgba(255,255,255,0.18);
  box-shadow:0 4px 0 #0a4018, 0 8px 24px rgba(26,140,52,0.50), inset 0 1px 0 rgba(255,255,255,0.25); }
.primary::before { content:"▶"; font-size:0.92em; }
.primary.pause { background:linear-gradient(160deg,#e84040 0%,#cc2828 55%,#9a1a1a 100%);
  box-shadow:0 4px 0 #600e0e, 0 8px 24px rgba(200,40,40,0.50), inset 0 1px 0 rgba(255,255,255,0.18); }
.primary.pause::before { content:"⏸"; }
.secondary { background:rgba(255,255,255,0.07); color:rgba(220,235,255,0.90);
  border:1px solid rgba(255,255,255,0.16);
  box-shadow:0 4px 0 rgba(0,0,0,0.42), 0 8px 20px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.16);
  backdrop-filter:blur(12px); font-size:0.62rem; letter-spacing:0.11em; }
.secondary::before { content:"↺"; font-size:1.1em; font-weight:400; }

/* ── FOOTER ── */
.footer { grid-area:footer; display:flex; align-items:center; justify-content:center; gap:8px; padding-bottom:2px; }
.footer-logo { width:clamp(16px,3.8vw,22px); height:clamp(16px,3.8vw,22px); object-fit:contain;
  filter:brightness(0) invert(1); opacity:0.75; }
.footer-text { color:rgba(255,255,255,0.75); font-size:clamp(0.46rem,1.3vw,0.58rem); font-weight:800; letter-spacing:0.24em; text-transform:uppercase; }

@media (max-width:420px) {
  .app { gap:6px; padding:8px; }
  .qbtn { width:52px; height:52px; font-size:0.86rem; }
  button { min-height:48px; border-radius:14px; }
  .timer { border-radius:22px; }
  .logoBox { width:26px; height:26px; }
}
@media (orientation:landscape) and (min-width:760px) {
  .app { grid-template-columns:minmax(252px,34%) minmax(0,1fr); grid-template-rows:auto 1fr auto auto;
    grid-template-areas:'header timer' 'quarters timer' 'controls timer' 'footer footer'; gap:12px 16px; }
  .header { align-self:start; } .quarters { align-self:start; } .controls { align-self:end; }
  .qbtn { width:clamp(46px,5.8vw,66px); height:clamp(46px,5.8vw,66px); }
  .time { font-size:clamp(2.0rem,26cqw,12rem); }
}

/* ── PWA INSTALL BANNER ── */
#installBanner {
  display:none;
  position:fixed; bottom:0; left:0; right:0; z-index:9999;
  background:rgba(9,30,72,0.97);
  border-top:1px solid rgba(255,255,255,0.18);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:14px 16px calc(14px + env(safe-area-inset-bottom)) 16px;
  box-shadow:0 -8px 32px rgba(0,0,0,0.50);
}
#installBanner.visible { display:flex; align-items:center; gap:12px; }
.install-icon {
  width:44px; height:44px; border-radius:10px; flex-shrink:0;
  background:linear-gradient(135deg,#1a4a8e,#0e2f6a);
  border:1px solid rgba(255,255,255,0.22);
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem;
}
.install-text { flex:1; min-width:0; }
.install-text strong { display:block; color:#fff; font-size:0.84rem; font-weight:800; letter-spacing:0.04em; }
.install-text .install-steps {
  color:rgba(255,255,255,0.72); font-size:0.72rem; margin-top:3px;
  display:flex; align-items:center; gap:5px; flex-wrap:wrap; line-height:1.5;
}
.install-steps .chip {
  background:rgba(255,255,255,0.13); border-radius:5px;
  padding:1px 6px; font-size:0.68rem; white-space:nowrap; font-weight:700;
}
#installClose {
  background:rgba(255,255,255,0.10); border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.70); border-radius:50%;
  width:28px; height:28px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; cursor:pointer; padding:0;
  min-height:unset; letter-spacing:0; text-transform:none; font-weight:400;
}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <div class="logoBox"><img id="ghcLogo" alt="GHC"/></div>
    <div class="brandText">
      <h1 class="brandTitle">HC Gooische</h1>
      <div class="brandSub">Wedstrijdtimer</div>
    </div>
    <button id="themeToggle" class="themeToggle" type="button">Dark</button>
  </header>
  <section class="quarters">
    <div class="half">
      <div class="halfTitle">Eerste helft<span class="ul"></span></div>
      <div class="qrow">
        <button class="qbtn" data-q="1" type="button">Q1</button>
        <button class="qbtn" data-q="2" type="button">Q2</button>
      </div>
    </div>
    <div class="half">
      <div class="halfTitle">Tweede helft<span class="ul"></span></div>
      <div class="qrow">
        <button class="qbtn" data-q="3" type="button">Q3</button>
        <button class="qbtn" data-q="4" type="button">Q4</button>
      </div>
    </div>
  </section>
  <section class="timer">
    <div class="timerInner">
      <div class="ringWrap">
        <svg id="ringSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="glowBlue" x="-25%" y="-25%" width="150%" height="150%">
              <feGaussianBlur stdDeviation="3.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glowRed" x="-25%" y="-25%" width="150%" height="150%">
              <feGaussianBlur stdDeviation="3.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Bezel: buitenste schaduwring (watch bezel diepte) -->
          <circle cx="100" cy="100" r="96" fill="none" stroke="rgba(0,0,0,0.55)" stroke-width="5"/>

          <!-- Ring achtergrond kleureffect -->
          <circle id="ringBg" cx="100" cy="100" r="82" fill="rgb(40,8,8)" opacity="0.55"/>

          <!-- Track: donkere achtergrond van de ring -->
          <circle id="ringTrack" cx="100" cy="100" r="92" fill="none" stroke-width="15"/>

          <!-- BLAUW: verstreken tijd (dikkere ring voor horloge-look) -->
          <circle id="ringArc"     cx="100" cy="100" r="92" fill="none" stroke-width="15" stroke-linecap="butt"/>

          <!-- ROOD: resterende tijd -->
          <circle id="ringElapsed" cx="100" cy="100" r="92" fill="none" stroke-width="15" stroke-linecap="butt"/>

          <!-- Compat -->
          <circle id="ringWarnArc" cx="100" cy="100" r="92" fill="none" stroke-width="15"
            stroke-linecap="round" style="opacity:0;"/>

          <!-- Bezel: binnenste highlight (glas-effect) -->
          <circle cx="100" cy="100" r="84.5" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
          <!-- Bezel: buitenste highlight -->
          <circle cx="100" cy="100" r="99.5" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

          <!-- Tick marks (gebouwd door JS) -->
          <g id="ringTicks"></g>

          <!-- ══ HOCKEYSTICKS in SVG (counter-rotated zodat ze rechtop staan) ══
               De outer SVG heeft CSS rotate(-90deg); deze g heeft rotate(+90deg) → ze heffen elkaar op
               Sticks gecentreerd op (100,150), kruisen op (100,138) -->
          <g transform="rotate(90, 100, 100)">
            <!-- Stick links: omhoog verschoven (1/3 richting tekst) -->
            <path d="M104 149 L93 156 Q88 161 85 159 Q84 156 87 155"
              stroke="rgba(255,255,255,0.42)" stroke-width="2.0"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <!-- Stick rechts -->
            <path d="M96 149 L107 156 Q112 161 115 159 Q116 156 113 155"
              stroke="rgba(255,255,255,0.42)" stroke-width="2.0"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <!-- Bal -->
            <circle cx="100" cy="159" r="2.0" fill="rgba(255,255,255,0.38)"/>
          </g>
        </svg>
        <!-- Logo: absoluut bovenaan ring -->
        <img class="ringLogo" id="ringLogo" alt="GHC"/>
        
        <div class="ringCenter">
          <div id="time" class="time">00:00</div>
          <div id="meta" class="meta">Gespeeld: <strong>00:00</strong> / 70:00</div>
        </div>
      </div>
    </div>
  </section>
  <section class="controls">
    <button id="start" class="primary" type="button">Start</button>
    <button id="reset" class="secondary" type="button" style="font-size:0.64rem;">Reset kwart</button>
  </section>
  <footer class="footer">
    <span class="footer-text">#wijzijngooische</span>
    <img class="footer-logo" id="footerLogo" alt="GHC"/>
    <span class="footer-text">We play &amp; win together</span>
  </footer>
</main>

<script>

    })();

    // ---- Constants ----
    const QLEN = 17 * 60 + 30;  // seconds per quarter
    const Q2Q4OFFSET = QLEN;
    const TOTAL_MATCH = QLEN * 4;
    const WARN_SECONDS = 60; // last-minute warning

    // ---- Elements ----
    const timeEl = document.getElementById('time');
    const metaEl = document.getElementById('meta');
    const startBtn = document.getElementById('start');
    const resetBtn = document.getElementById('reset');
    const themeToggle = document.getElementById('themeToggle');
    const qButtons = Array.from(document.querySelectorAll('.qbtn'));

    // Ring SVG elements
    const ringTrack = document.getElementById('ringTrack');
    const ringArc = document.getElementById('ringArc');
    const ringWarnArc = document.getElementById('ringWarnArc');
    const ringTicks = document.getElementById('ringTicks');

    // ---- State ----
    let audioCtx = null;
    let wakeLock = null;
    const lastMinuteBeeped = { 1: false, 2: false, 3: false, 4: false };

    let currentQuarter = 1;
    let quarterTimes = { 1: 0, 2: 0, 3: 0, 4: 0 };
    let running = false;
    let lastTs = null;
    let rafId = null;
    let runStartedAt = null;
    let runBaseElapsed = 0;

    // ---- Ring geometry ----
    const R = 92;
    const CX = 100, CY = 100;
    const CIRCUMFERENCE = 2 * Math.PI * R;

    (function buildTicks() {
      const cx=100, cy=100, r=92, N=120;
      ringTicks.innerHTML='';
      for(let i=0;i<N;i++){
        const angle=(i/N)*2*Math.PI;
        const isMajor=(i%10===0);  // 12 grote ticks (elke 30°, zoals klok)
        const innerR = isMajor ? r-22 : r-16;  // major: 12 lang, minor: 6 lang
        const outerR = r-10;  // eindigen net binnen inner ring edge (84.5)
        const x1=cx+innerR*Math.cos(angle), y1=cy+innerR*Math.sin(angle);
        const x2=cx+outerR*Math.cos(angle), y2=cy+outerR*Math.sin(angle);
        const line=document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1',x1); line.setAttribute('y1',y1);
        line.setAttribute('x2',x2); line.setAttribute('y2',y2);
        line.setAttribute('stroke-width', isMajor?'2.5':'1.3');
        line.setAttribute('stroke-linecap','round');
        line.dataset.tickFrac=i/N;
        ringTicks.appendChild(line);
      }
    })();

    function updateRingColors() {
      const isDark = document.body.classList.contains('dark');
      const blueColor = '#3a8fff';
      const redColor  = '#e03030';
      ringTrack.setAttribute('stroke','rgba(255,255,255,0.06)');
      ringArc._blueColor  = blueColor;
      ringArc._redColor   = redColor;
      ringWarnArc.setAttribute('stroke', redColor);
    }

    function updateRingArc(elapsedSeconds) {
      const blueColor  = ringArc._blueColor  || '#3a78e8';
      const redColor   = ringArc._redColor   || '#e03030';

      // Clamp fractions
      const elapsedFrac  = Math.max(0, Math.min(1, elapsedSeconds / QLEN));
      const remainFrac   = 1 - elapsedFrac;

      const elapsedLen = elapsedFrac  * CIRCUMFERENCE;
      const remainLen  = remainFrac   * CIRCUMFERENCE;

      // --- BLAUW arc: verstreken tijd --- groeit met klok mee vanaf 12 uur
      // Bij start: elapsed=0 → blauw=0, rood=vol
      // Na verloop: blauw groeit rechts, rood krimpt
      ringArc.setAttribute('stroke', blueColor);
      ringArc.setAttribute('stroke-dasharray', elapsedLen + ' ' + CIRCUMFERENCE);
      ringArc.setAttribute('stroke-dashoffset', '0');

      // --- ROOD arc: resterende tijd --- begint waar blauw eindigt, krimpt
      const ringElapsed = document.getElementById('ringElapsed');
      ringElapsed.setAttribute('stroke', redColor);
      ringElapsed.setAttribute('stroke-dasharray', remainLen + ' ' + CIRCUMFERENCE);
      ringElapsed.setAttribute('stroke-dashoffset', -elapsedLen);

      // Add a bright glow on the leading edge of the red arc
      // (achieved via filter in CSS — no extra JS needed)

      // Keep warn arc hidden (compat)
      ringWarnArc.style.opacity = '0';

      // ── Tick kleuren volgen ring ──
      Array.from(ringTicks.children).forEach(line=>{
        const frac=parseFloat(line.dataset.tickFrac||0);
        if(frac<elapsedFrac){
          line.setAttribute('stroke','rgba(80,160,255,0.70)');
          line.setAttribute('opacity','0.75');
        } else {
          line.setAttribute('stroke','rgba(255,70,70,0.65)');
          line.setAttribute('opacity','0.50');
        }
      });

      // ── Ring achtergrond kleur meeveranderen ──
      const ringBg=document.getElementById('ringBg');
      if(ringBg){
        // rood → blauw naarmate tijd verstrijkt
        const t=elapsedFrac;
        const ri=Math.round((1-t)*40+t*8);
        const gi=Math.round((1-t)*8+t*16);
        const bi=Math.round((1-t)*8+t*55);
        ringBg.style.fill='rgb('+ri+','+gi+','+bi+')';
        ringBg.setAttribute('opacity','0.55');
      }

      // ── Knipperen in laatste minuut ──
      const timeEl2=document.getElementById('time');
      if(timeEl2){
        if(elapsedSeconds>=(QLEN-60)){
          timeEl2.classList.add('blink');
        } else {
          timeEl2.classList.remove('blink');
        }
      }
    }

    // ---- Helpers ----
    function quarterElapsed(q) { return quarterTimes[q]; }
    function setQuarterElapsed(q, val) { quarterTimes[q] = Math.max(0, val); }
    function resetBeepState(q) { lastMinuteBeeped[q] = false; }

    function ensureAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (err) {}
    }

    function beepLastMinute() {
      try {
        ensureAudio();
        if (!audioCtx) return;
        // Three-tone alert beep (louder)
        const now = audioCtx.currentTime;
        [0, 0.25, 0.50].forEach((delay, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = i === 0 ? 880 : i === 1 ? 1046 : 1318;
          gain.gain.setValueAtTime(0.0001, now + delay);
          gain.gain.exponentialRampToValueAtTime(0.35, now + delay + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + 0.22);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now + delay);
          osc.stop(now + delay + 0.25);
        });
      } catch (err) {}
    }

    function fmt(seconds) {
      seconds = Math.max(0, Math.floor(seconds));
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function displayValue(q) {
      const e = quarterElapsed(q);
      return (q === 2 || q === 4) ? e + Q2Q4OFFSET : e;
    }

    function updateButtons() {
      qButtons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.q) === currentQuarter));
    }

    function updateWarning() {
      const warn = quarterElapsed(currentQuarter) >= (QLEN - WARN_SECONDS);
      timeEl.classList.toggle('warn', warn);
    }

    function totalElapsedMatch() {
      return quarterTimes[1] + quarterTimes[2] + quarterTimes[3] + quarterTimes[4];
    }

    function updateUI() {
      const elapsedQuarter = quarterElapsed(currentQuarter);
      const display = displayValue(currentQuarter);
      const totalElapsed = totalElapsedMatch();

      timeEl.textContent = fmt(display);
      metaEl.innerHTML = 'Gespeeld: <strong>' + fmt(totalElapsed) + '</strong> / ' + fmt(TOTAL_MATCH);
      updateButtons();
      updateWarning();
      updateRingArc(elapsedQuarter);

      startBtn.textContent = running ? 'Pauze' : 'Start';
      startBtn.classList.toggle('pause', running);
    }

    async function requestWakeLock() {
      try {
        if (!('wakeLock' in navigator)) return;
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
      } catch (err) { wakeLock = null; }
    }

    async function releaseWakeLock() {
      try {
        if (wakeLock) { await wakeLock.release(); wakeLock = null; }
      } catch (err) {}
    }

    function syncRunningTime() {
      if (!running || runStartedAt == null) return;
      const nowElapsed = runBaseElapsed + ((Date.now() - runStartedAt) / 1000);
      setQuarterElapsed(currentQuarter, nowElapsed);
    }

    function stopTimer() {
      syncRunningTime();
      running = false;
      lastTs = null;
      runStartedAt = null;
      runBaseElapsed = 0;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      releaseWakeLock();
      updateUI();
    }

    function tick() {
      if (!running) return;

      const prev = quarterElapsed(currentQuarter);
      syncRunningTime();
      const nowElapsed = quarterElapsed(currentQuarter);

      // Last-minute beep trigger. De timer loopt na 17:30 gewoon door.
      if (!lastMinuteBeeped[currentQuarter] && prev < (QLEN - WARN_SECONDS) && nowElapsed >= (QLEN - WARN_SECONDS)) {
        lastMinuteBeeped[currentQuarter] = true;
        beepLastMinute();
      }

      updateUI();
      rafId = requestAnimationFrame(tick);
    }

    async function startTimer() {
      if (running) return;
      running = true;
      lastTs = null;
      runBaseElapsed = quarterElapsed(currentQuarter);
      runStartedAt = Date.now();
      ensureAudio();
      await requestWakeLock();
      rafId = requestAnimationFrame(tick);
      updateUI();
    }

    function toggleStartPause() { if (running) stopTimer(); else startTimer(); }

    function resetCurrentQuarter() {
      running = false;
      lastTs = null;
      runStartedAt = null;
      runBaseElapsed = 0;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      releaseWakeLock();
      setQuarterElapsed(currentQuarter, 0);
      resetBeepState(currentQuarter);
      updateUI();
    }

    function changeQuarter(q) {
      stopTimer();
      currentQuarter = q;
      updateUI();
      if ('vibrate' in navigator) navigator.vibrate(10);
    }

    function applyTheme(mode) {
      document.body.classList.toggle('dark', mode === 'dark');
      localStorage.setItem('ghc-theme', mode);
      themeToggle.textContent = mode === 'dark' ? 'Light' : 'Dark';
      updateRingColors();
      updateUI();
    }

    function initTheme() {
      const saved = localStorage.getItem('ghc-theme');
      if (saved === 'dark' || saved === 'light') applyTheme(saved);
      else applyTheme((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
    }

    startBtn.addEventListener('click', toggleStartPause);
    resetBtn.addEventListener('click', resetCurrentQuarter);
    themeToggle.addEventListener('click', () => applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark'));
    qButtons.forEach(btn => btn.addEventListener('click', () => changeQuarter(Number(btn.dataset.q))));

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && running) {
        syncRunningTime();
        requestWakeLock();
        updateUI();
        if (!rafId) rafId = requestAnimationFrame(tick);
      }
    });

    window.addEventListener('pageshow', () => {
      if (running) {
        syncRunningTime();
        updateUI();
        if (!rafId) rafId = requestAnimationFrame(tick);
      }
    });

    initTheme();
    updateUI();
  </script>

    <strong>Voeg toe aan beginscherm</strong>
    <div class="install-steps">
      Tik op <span class="chip">Delen ⎋</span> dan <span class="chip">Zet op beginscherm</span> voor volledig scherm
    </div>
  </div>
  <button id="installClose" type="button" aria-label="Sluiten">✕</button>
</div>
<script>
  // Show banner only in Safari browser (not standalone PWA)
  (function() {
    const isStandalone = window.navigator.standalone === true;
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    const dismissed = sessionStorage.getItem('ghc-install-dismissed');
    if (!isStandalone && isSafari && !dismissed) {
      document.getElementById('installBanner').classList.add('visible');
    }
    document.getElementById('installClose').addEventListener('click', function() {
      document.getElementById('installBanner').classList.remove('visible');
      sessionStorage.setItem('ghc-install-dismissed', '1');
    });
  })();
</script>
</body>
</html>
