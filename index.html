<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GHC Timer" />
<link rel="apple-touch-icon" sizes="180x180" href="ghc-icon.png" />
<link rel="icon" type="image/png" href="ghc-icon.png" />
<title>Gooische HC Timer</title>
<style>
  :root {
    --bg1: #d9e8f7;
    --bg2: #bdd3ea;
    --navy: #12345f;
    --line: rgba(18, 52, 95, 0.22);
    --panel: rgba(255,255,255,0.96);
    --panel2: rgba(255,255,255,0.78);
    --muted: rgba(18, 52, 95, 0.60);
    --light-pill: #dfe8f1;
    --active-pill: #102b54;
    --green: #2e7d32;
    --red: #c52f25;
    --shadow: 0 18px 40px rgba(18, 52, 95, 0.12);
    --time-color: #111111;
    --label-color: rgba(18,52,95,0.88);
    --sub-color: rgba(18,52,95,0.58);
    --toggle-bg: rgba(255,255,255,0.55);
    --toggle-text: #12345f;
    --dark-accent: #ffd54d;
    --dark-muted: rgba(255, 245, 196, 0.75);
    --ring-track: rgba(18,52,95,0.12);
    --ring-fill: #e05555;
    --ring-warn: #c52f25;
    --ring-tick: rgba(18,52,95,0.35);
  }

  body.dark {
    --bg1: #071225;
    --bg2: #0c1d34;
    --navy: #f5f8ff;
    --line: rgba(255,255,255,0.18);
    --panel: rgba(13, 24, 43, 0.96);
    --panel2: rgba(19, 31, 52, 0.80);
    --muted: rgba(243, 247, 255, 0.72);
    --light-pill: #152843;
    --active-pill: #f3f7ff;
    --green: #3d9b47;
    --red: #e15b4f;
    --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    --time-color: #ffd54d;
    --label-color: #f7f8ff;
    --sub-color: rgba(255, 245, 196, 0.78);
    --toggle-bg: rgba(255,255,255,0.08);
    --toggle-text: #f7f8ff;
    --ring-track: rgba(255,255,255,0.10);
    --ring-fill: #ffd54d;
    --ring-warn: #e15b4f;
    --ring-tick: rgba(255,255,255,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== STADIUM BACKGROUND (light mode = screenshot style) ===== */
  body {
    background:
      radial-gradient(ellipse 80% 60% at 25% -5%, rgba(180,215,255,0.90) 0%, transparent 55%),
      radial-gradient(ellipse 80% 60% at 75% -5%, rgba(160,200,255,0.80) 0%, transparent 55%),
      linear-gradient(175deg, #a8cff0 0%, #7aadd9 25%, #4a82be 55%, #1e4a82 85%, #0d2545 100%);
    color: var(--navy);
  }

  /* Grid overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.10) 1px, transparent 1px);
    background-size: 36px 36px;
    z-index: 0;
  }

  /* Stadium floodlight glow spots */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 40% 30% at 20% 5%, rgba(255,255,255,0.35) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 5%, rgba(255,255,255,0.30) 0%, transparent 70%);
    z-index: 0;
  }

  body.dark {
    background:
      radial-gradient(ellipse 80% 60% at 25% -5%, rgba(30,70,140,0.70) 0%, transparent 55%),
      radial-gradient(ellipse 80% 60% at 75% -5%, rgba(25,60,120,0.60) 0%, transparent 55%),
      linear-gradient(175deg, #0e2040 0%, #091628 50%, #050e1a 100%);
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100dvh;
    padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    display: grid;
    gap: 10px;
    grid-template-rows: auto auto minmax(0, 1fr) auto auto;
    grid-template-areas: 'header' 'quarters' 'timer' 'controls' 'footer';
  }

  /* ===== HEADER ===== */
  .header {
    grid-area: header;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 0 2px;
    min-width: 0;
  }

  .logoBox {
    width: clamp(52px, 11vw, 72px);
    height: clamp(52px, 11vw, 72px);
    background: transparent;
    display: grid;
    place-items: center;
    overflow: hidden;
    flex: 0 0 auto;
    border-radius: 8px;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.45));
  }

  .logoBox img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .brandText { min-width: 0; line-height: 1; }

  .brandTitle {
    margin: 0;
    color: #0e2554;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.10em;
    font-size: clamp(1.35rem, 4.5vw, 2.2rem);
    line-height: 1;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(255,255,255,0.3);
  }

  body.dark .brandTitle { color: #ffffff; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }

  .brandSub {
    margin-top: 7px;
    color: #2a5ba0;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.42em;
    font-size: clamp(0.60rem, 1.9vw, 0.86rem);
    line-height: 1.15;
  }

  body.dark .brandSub { color: rgba(160,200,255,0.80); }

  /* Theme toggle — dark navy pill with moon */
  .themeToggle {
    display: flex;
    align-items: center;
    gap: 7px;
    border: none;
    background: #0d2855;
    color: #ffffff;
    border-radius: 999px;
    padding: 9px 16px 9px 12px;
    min-height: 40px;
    font-size: 0.76rem;
    font-weight: 900;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.12);
    cursor: pointer;
    touch-action: manipulation;
    transition: background .15s;
  }
  .themeToggle .moon-icon { font-size: 1.0rem; line-height: 1; }
  body.dark .themeToggle { background: rgba(255,255,255,0.10); }

  /* ===== QUARTERS ===== */
  .quarters {
    grid-area: quarters;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding-top: 2px;
    min-width: 0;
  }

  .half {
    display: grid;
    justify-items: center;
    align-content: start;
    gap: 10px;
    padding: 0 10px;
    min-width: 0;
    position: relative;
  }

  .half:first-child {
    border-right: 1px solid rgba(255,255,255,0.20);
  }

  .halfTitle {
    position: relative;
    width: 100%;
    text-align: center;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.20em;
    color: #0d2554;
    font-size: clamp(0.78rem, 2.3vw, 1.02rem);
    padding-bottom: 10px;
    /* Dashes via pseudo — match screenshot "— EERSTE HELFT —" */
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  body.dark .halfTitle { color: rgba(200,230,255,0.90); }

  .halfTitle::before,
  .halfTitle::after {
    content: "—";
    opacity: 0.45;
    flex-shrink: 0;
  }

  /* Blue underline bar below title */
  .halfTitle-underline {
    position: absolute;
    bottom: 0;
    left: 18%;
    right: 18%;
    height: 3px;
    border-radius: 2px;
    background: rgba(30,80,180,0.20);
  }

  .half:first-child .halfTitle-underline {
    background: #2a65c8;
  }
  body.dark .half:first-child .halfTitle-underline { background: rgba(255,255,255,0.65); }

  .qrow {
    display: flex;
    justify-content: center;
    gap: 16px;
    width: 100%;
    padding-top: 2px;
  }

  /* Quarter buttons — circles */
  .qbtn {
    width: clamp(66px, 12vw, 90px);
    height: clamp(66px, 12vw, 90px);
    border-radius: 50%;
    border: 2px solid rgba(10,40,100,0.55);
    background: rgba(220,235,255,0.45);
    color: rgba(10,30,80,0.55);
    font-weight: 900;
    font-size: clamp(1.05rem, 2.8vw, 1.52rem);
    display: grid;
    place-items: center;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    transition: transform .08s ease, background .12s ease, color .12s ease, box-shadow .12s ease, border-color .12s ease;
    position: relative;
  }

  body.dark .qbtn {
    border-color: rgba(255,255,255,0.22);
    color: rgba(255,255,255,0.50);
    background: rgba(255,255,255,0.06);
  }

  .qbtn.active {
    background: #0e2657;
    color: #ffffff;
    border-color: #3a72cc;
    box-shadow: 0 0 0 3px rgba(58,114,204,0.30), 0 8px 20px rgba(0,0,30,0.35);
    transform: translateY(-1px);
  }

  /* Gold underline dot on active Q button */
  .qbtn.active::after {
    content: "";
    position: absolute;
    bottom: 9px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 3px;
    border-radius: 2px;
    background: #e8a020;
  }

  body.dark .qbtn.active {
    background: #ffd54d;
    color: #091222;
    border-color: transparent;
  }
  body.dark .qbtn.active::after { background: #091222; }

  /* ===== TIMER PANEL ===== */
  .timer {
    grid-area: timer;
    background: linear-gradient(145deg, rgba(12,28,60,0.94) 0%, rgba(7,16,36,0.97) 100%);
    border: 1.5px solid rgba(80,140,255,0.20);
    border-radius: 28px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.55),
      0 24px 64px rgba(0,0,0,0.65),
      inset 0 1px 0 rgba(100,170,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 14px;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
    position: relative;
    container-type: size;
  }

  /* Diagonal stripe texture */
  .timer::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 26px;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 22px,
      rgba(255,255,255,0.018) 22px,
      rgba(255,255,255,0.018) 44px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Hexagon dot pattern */
  .timer::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 26px;
    background-image: radial-gradient(circle, rgba(80,140,255,0.07) 1px, transparent 1px);
    background-size: 22px 22px;
    pointer-events: none;
    z-index: 0;
  }

  .timerInner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  /* ===== RING WRAP ===== */
  .ringWrap {
    position: relative;
    width: min(100%, 100cqh);
    aspect-ratio: 1;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 1 auto;
  }

  @container (min-width: 1px) {
    .ringWrap {
      width: min(calc(100cqw - 10px), calc(100cqh - 10px));
    }
  }

  .ringWrap svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
    overflow: visible;
  }

  .ringCenter {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    width: 78%;
    text-align: center;
    gap: 0;
  }

  /* Hockey sticks SVG icon above the time */
  .hockeyIcon {
    width: clamp(22px, 5cqw, 34px);
    height: clamp(22px, 5cqw, 34px);
    opacity: 0.65;
    margin-bottom: clamp(2px, 1cqw, 8px);
  }

  .time {
    margin: 0;
    font-size: clamp(3rem, 24cqw, 13rem);
    line-height: 0.95;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: #ffffff;
    font-variant-numeric: tabular-nums;
    text-align: center;
    transition: color 0.3s ease;
    white-space: nowrap;
  }

  .time.warn { color: #e04040; }

  .meta {
    margin-top: clamp(3px, 1.2cqw, 10px);
    font-size: clamp(0.58rem, 1.7cqw, 0.86rem);
    letter-spacing: 0.08em;
    color: #5590e8;
    text-align: center;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
    white-space: nowrap;
  }
  .meta strong { color: #6fa0f0; letter-spacing: 0.08em; }

  /* ===== CONTROLS ===== */
  .controls {
    grid-area: controls;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
  }

  button {
    border: none;
    border-radius: 14px;
    font: inherit;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    min-height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* START button — bright green with raised edge */
  .primary {
    background: linear-gradient(180deg, #33b847 0%, #239934 60%, #1b7e29 100%);
    color: #fff;
    font-size: clamp(0.88rem, 2.4vw, 1.1rem);
    letter-spacing: 0.18em;
    box-shadow:
      0 5px 0 #0f5718,
      0 8px 24px rgba(20,120,40,0.55);
    position: relative;
    flex-direction: column;
    gap: 1px;
    padding: 10px 14px;
  }

  .primary-inner {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .primary-sub {
    font-size: clamp(0.58rem, 1.4vw, 0.72rem);
    letter-spacing: 0.16em;
    font-weight: 700;
    opacity: 0.85;
    text-transform: uppercase;
  }

  .primary.pause {
    background: linear-gradient(180deg, #e84040 0%, #cc2a2a 60%, #a82020 100%);
    box-shadow: 0 5px 0 #6a1010, 0 8px 24px rgba(180,30,30,0.55);
  }

  /* RESET button — white/light with navy text */
  .secondary {
    background: linear-gradient(180deg, #f5f8ff 0%, #dce8ff 100%);
    color: #0d2654;
    border: 1.5px solid rgba(50,90,190,0.20);
    font-size: clamp(0.72rem, 1.8vw, 0.88rem);
    letter-spacing: 0.14em;
    flex-direction: column;
    gap: 1px;
    padding: 10px 8px;
    box-shadow:
      0 5px 0 #8099cc,
      0 8px 20px rgba(0,0,0,0.30);
  }

  .secondary-main {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: clamp(0.82rem, 2.1vw, 1.0rem);
    font-weight: 900;
  }

  .secondary-sub {
    font-size: clamp(0.58rem, 1.4vw, 0.72rem);
    letter-spacing: 0.16em;
    font-weight: 700;
    opacity: 0.70;
  }

  body.dark .secondary {
    background: rgba(255,255,255,0.08);
    color: #ffffff;
    border-color: rgba(255,255,255,0.14);
    box-shadow: 0 5px 0 rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.35);
  }

  /* ===== FOOTER ===== */
  .footer {
    grid-area: footer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding-bottom: 2px;
  }

  .footer-text {
    color: rgba(200,220,255,0.55);
    font-size: clamp(0.60rem, 1.7vw, 0.75rem);
    font-weight: 700;
    letter-spacing: 0.30em;
    text-transform: uppercase;
  }

  body.dark .footer-text { color: rgba(180,200,255,0.45); }

  .footer-logo {
    width: clamp(22px, 5vw, 30px);
    height: clamp(22px, 5vw, 30px);
    object-fit: contain;
    opacity: 0.55;
    filter: brightness(1.5) saturate(0.5);
  }

  @media (max-width: 420px) {
    .app { gap: 8px; padding: 10px 10px 8px; }
    .header { gap: 10px; }
    .logoBox { width: 48px; height: 48px; }
    .brandSub { letter-spacing: 0.22em; margin-top: 5px; }
    .themeToggle { padding: 7px 12px 7px 10px; min-height: 36px; font-size: 0.68rem; }
    .quarters { padding-top: 2px; }
    .half { padding: 0 6px; }
    .qrow { gap: 10px; }
    .controls { gap: 10px; }
    button { min-height: 52px; border-radius: 12px; }
    .timer { border-radius: 22px; padding: 10px; }
  }

  @media (orientation: landscape) and (min-width: 760px) {
    .app {
      grid-template-columns: minmax(290px, 38%) minmax(0, 1fr);
      grid-template-rows: auto 1fr auto auto;
      grid-template-areas: 'header timer' 'quarters timer' 'controls timer' 'footer footer';
      align-items: stretch;
      gap: 14px 18px;
      overflow: hidden;
    }
    .header { align-self: start; gap: 10px; min-width: 0; }
    .logoBox { width: clamp(52px, 8vw, 72px); height: clamp(52px, 8vw, 72px); }
    .brandTitle { font-size: clamp(1rem, 2.8vw, 1.6rem); }
    .brandSub { font-size: clamp(0.56rem, 1.4vw, 0.82rem); margin-top: 5px; }
    .quarters { align-self: start; padding-top: 4px; min-width: 0; }
    .half { padding: 0 4px; }
    .halfTitle { font-size: clamp(0.72rem, 1.6vw, 0.98rem); letter-spacing: 0.14em; }
    .qrow { gap: 10px; }
    .qbtn { width: clamp(52px, 7vw, 76px); height: clamp(52px, 7vw, 76px); font-size: clamp(0.92rem, 1.8vw, 1.24rem); }
    .timer { min-height: 0; padding: 12px; }
    .time { font-size: clamp(2.4rem, 22cqw, 11rem); }
    .controls { align-self: end; }
    .footer { align-self: end; }
  }
</style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="logoBox" aria-label="Gooische Hockey Club logo">
        <img id="ghcLogo" alt="Gooische Hockey Club Bussum" />
      </div>
      <div class="brandText">
        <h1 class="brandTitle">HC Gooische</h1>
        <div class="brandSub">Wedstrijdtimer</div>
      </div>
      <button id="themeToggle" class="themeToggle" type="button" aria-label="Wissel licht of donker modus">
        <span class="moon-icon">🌙</span>Dark
      </button>
    </header>

    <section class="quarters" aria-label="Kwarten">
      <div class="half">
        <div class="halfTitle">Eerste helft<span class="halfTitle-underline"></span></div>
        <div class="qrow">
          <button class="qbtn" data-q="1" type="button">Q1</button>
          <button class="qbtn" data-q="2" type="button">Q2</button>
        </div>
      </div>
      <div class="half">
        <div class="halfTitle">Tweede helft<span class="halfTitle-underline"></span></div>
        <div class="qrow">
          <button class="qbtn" data-q="3" type="button">Q3</button>
          <button class="qbtn" data-q="4" type="button">Q4</button>
        </div>
      </div>
    </section>

    <section class="timer" aria-label="Timer">
      <div class="timerInner">
        <div class="ringWrap">
          <!-- SVG ring drawn by JS -->
          <svg id="ringSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- tick marks group -->
            <g id="ringTicks"></g>
            <!-- background track -->
            <circle id="ringTrack" cx="100" cy="100" r="88" fill="none" stroke-width="13.5" />
            <!-- progress arc -->
            <circle id="ringArc" cx="100" cy="100" r="88" fill="none" stroke-width="13.5"
              stroke-linecap="round" />
            <!-- warning arc (last minute highlight) -->
            <circle id="ringWarnArc" cx="100" cy="100" r="88" fill="none" stroke-width="13.5"
              stroke-linecap="round" style="opacity:0;" />
          </svg>
          <div class="ringCenter">
            <!-- Hockey sticks icon -->
            <svg class="hockeyIcon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 6 L20 26 L22 32 L27 31 L26 25 L16 6Z" stroke="white" stroke-width="2.2" stroke-linejoin="round" fill="none"/>
              <path d="M30 6 L20 26 L18 32 L13 31 L14 25 L24 6Z" stroke="white" stroke-width="2.2" stroke-linejoin="round" fill="none"/>
            </svg>
            <div id="time" class="time">00:00</div>
            <div id="meta" class="meta">Gespeeld: <strong>00:00</strong> / 70:00</div>
          </div>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="Bediening">
      <button id="start" class="primary" type="button">
        <div class="primary-inner">
          <span id="startIcon">▶</span>
          <span id="startLabel">Start</span>
        </div>
        <div class="primary-sub" id="startSub">Start kwartier</div>
      </button>
      <button id="reset" class="secondary" type="button">
        <div class="secondary-main">
          <span>↻</span><span>Reset</span>
        </div>
        <div class="secondary-sub">Quarter</div>
      </button>
    </section>
