<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="GHC Timer" />
<link rel="apple-touch-icon" sizes="180x180" href="ghc-icon.png" />
<link rel="icon" type="image/png" href="ghc-icon.png" />
<title>Gooische HC Timer</title>
<style>
  :root {
    --bg1: #d9e8f7;
    --bg2: #bdd3ea;
    --navy: #12345f;
    --line: rgba(18, 52, 95, 0.22);
    --panel: rgba(255,255,255,0.96);
    --muted: rgba(18, 52, 95, 0.60);
    --light-pill: rgba(220,235,255,0.50);
    --active-pill: #102b54;
    --green: #1e8c2c;
    --red: #c52f25;
    --time-color: #ffffff;
    --label-color: #1a3a6e;
    --sub-color: #2a65b0;
    --toggle-bg: #0e2655;
    --toggle-text: #ffffff;
    --ring-track: rgba(255,255,255,0.12);
    --ring-fill: #e05555;
    --ring-warn: #c52f25;
    --ring-tick: rgba(255,255,255,0.30);
  }

  body.dark {
    --bg1: #071225;
    --bg2: #0c1d34;
    --navy: #f5f8ff;
    --line: rgba(255,255,255,0.18);
    --panel: rgba(10, 20, 40, 0.96);
    --muted: rgba(243, 247, 255, 0.72);
    --light-pill: rgba(255,255,255,0.08);
    --active-pill: #f3f7ff;
    --green: #3d9b47;
    --red: #e15b4f;
    --time-color: #ffd54d;
    --label-color: #c8dcff;
    --sub-color: rgba(180,215,255,0.75);
    --toggle-bg: rgba(255,255,255,0.10);
    --toggle-text: #f7f8ff;
    --ring-track: rgba(255,255,255,0.10);
    --ring-fill: #ffd54d;
    --ring-warn: #e15b4f;
    --ring-tick: rgba(255,255,255,0.25);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--navy);
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== STADIUM BACKGROUND ===== */
  body {
    background:
      radial-gradient(ellipse 70% 50% at 20% 0%, rgba(180,220,255,0.85) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 0%, rgba(160,205,255,0.75) 0%, transparent 60%),
      linear-gradient(175deg, #9ec8f0 0%, #6aa8db 20%, #3a78c0 50%, #1a4a90 75%, #0b2350 100%);
  }

  /* Grid lines overlay */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.09) 1px, transparent 1px);
    background-size: 34px 34px;
    z-index: 0;
  }

  body.dark {
    background:
      radial-gradient(ellipse 70% 50% at 20% 0%, rgba(20,60,140,0.70) 0%, transparent 60%),
      radial-gradient(ellipse 70% 50% at 80% 0%, rgba(15,50,120,0.60) 0%, transparent 60%),
      linear-gradient(175deg, #0d1e3e 0%, #08142a 50%, #040d1c 100%);
  }

  .app {
    position: relative;
    z-index: 1;
    height: 100dvh;
    padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    display: grid;
    gap: 10px;
    grid-template-rows: auto auto minmax(0, 1fr) auto;
    grid-template-areas: 'header' 'quarters' 'timer' 'controls';
  }

  /* ===== HEADER ===== */
  .header {
    grid-area: header;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 2px 2px 0;
    min-width: 0;
  }

  .logoBox {
    width: clamp(52px, 11vw, 80px);
    height: clamp(52px, 11vw, 80px);
    background: transparent;
    display: grid;
    place-items: center;
    overflow: hidden;
    flex: 0 0 auto;
    border-radius: 6px;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.35));
  }

  .logoBox img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .brandText { min-width: 0; line-height: 1; }

  .brandTitle {
    margin: 0;
    color: #0e2554;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: clamp(1.1rem, 4vw, 2rem);
    line-height: 1;
    white-space: nowrap;
  }
  body.dark .brandTitle { color: #ffffff; }

  .brandSub {
    margin-top: 9px;
    color: var(--sub-color);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.38em;
    font-size: clamp(0.72rem, 2.2vw, 1.02rem);
    line-height: 1.15;
  }

  /* Dark navy pill with moon icon */
  .themeToggle {
    border: none;
    background: var(--toggle-bg);
    color: var(--toggle-text);
    border-radius: 999px;
    padding: 9px 15px 9px 11px;
    min-height: 40px;
    font-size: 0.76rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    box-shadow: 0 4px 14px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.10);
    cursor: pointer;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .themeToggle::before {
    content: "🌙";
    font-size: 0.95rem;
  }

  /* ===== QUARTERS ===== */
  .quarters {
    grid-area: quarters;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding-top: 6px;
    min-width: 0;
  }

  .half {
    display: grid;
    justify-items: center;
    align-content: start;
    gap: 10px;
    padding: 0 10px 0;
    min-width: 0;
    position: relative;
  }

  .half:first-child { border-right: 1px solid rgba(255,255,255,0.18); }

  .halfTitle {
    position: relative;
    width: 100%;
    text-align: center;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--label-color);
    font-size: clamp(0.82rem, 2.3vw, 1.02rem);
    padding-bottom: 10px;
    /* Dashes on both sides */
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  body.dark .halfTitle { color: rgba(200,230,255,0.90); }

  .halfTitle::before,
  .halfTitle::after {
    content: "—";
    opacity: 0.45;
    font-weight: 400;
    flex-shrink: 0;
  }

  /* Blue underline */
  .halfTitle > span.ul {
    position: absolute;
    bottom: 0;
    left: 18%;
    right: 18%;
    height: 3px;
    border-radius: 2px;
    background: rgba(30,80,200,0.18);
  }
  .half:first-child .halfTitle > span.ul { background: #2a65c8; }
  body.dark .half:first-child .halfTitle > span.ul { background: rgba(255,255,255,0.65); }

  .qrow {
    display: flex;
    justify-content: center;
    gap: 14px;
    width: 100%;
    padding-top: 2px;
  }

  .qbtn {
    width: clamp(70px, 12vw, 94px);
    height: clamp(70px, 12vw, 94px);
    border-radius: 50%;
    border: 2px solid rgba(20,60,150,0.55);
    background: var(--light-pill);
    color: rgba(10,30,90,0.50);
    font-weight: 900;
    font-size: clamp(1.10rem, 2.8vw, 1.62rem);
    display: grid;
    place-items: center;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
    transition: transform .08s ease, background .12s ease, color .12s ease, box-shadow .12s ease, border-color .12s ease;
    position: relative;
  }

  .qbtn.active {
    background: #0e2657;
    color: #ffffff;
    border-color: #3a72cc;
    box-shadow: 0 0 0 3px rgba(58,114,204,0.28), 0 8px 20px rgba(0,0,40,0.35);
    transform: translateY(-1px);
  }
  /* Gold underline on active */
  .qbtn.active::after {
    content: "";
    position: absolute;
    bottom: 9px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 3px;
    border-radius: 2px;
    background: #e8a020;
  }

  body.dark .qbtn {
    border-color: rgba(255,255,255,0.20);
    color: rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.06);
  }
  body.dark .qbtn.active {
    background: #ffd54d;
    color: #091222;
    border-color: rgba(255,255,255,0.0);
  }
  body.dark .qbtn.active::after { background: #091222; }

  /* ===== TIMER PANEL ===== */
  .timer {
    grid-area: timer;
    background: linear-gradient(145deg, rgba(10,24,55,0.95) 0%, rgba(6,14,32,0.97) 100%);
    border: 1.5px solid rgba(70,130,255,0.22);
    border-radius: 28px;
    box-shadow:
      0 0 0 1px rgba(0,0,0,0.55),
      0 24px 64px rgba(0,0,0,0.65),
      inset 0 1px 0 rgba(80,160,255,0.10);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
    position: relative;
    container-type: size;
  }

  /* Diagonal stripe texture */
  .timer::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 26px;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 20px,
      rgba(255,255,255,0.016) 20px, rgba(255,255,255,0.016) 40px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Hex dot overlay */
  /* Red arc glow effect */
  #ringElapsed {
    filter: drop-shadow(0 0 4px rgba(220,40,40,0.7));
  }

  .timer::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 26px;
    background-image: radial-gradient(circle, rgba(80,140,255,0.06) 1px, transparent 1px);
    background-size: 22px 22px;
    pointer-events: none;
    z-index: 0;
  }

  .timerInner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
    z-index: 1;
  }

  /* ===== RING ===== */
  .ringWrap {
    position: relative;
    width: min(100%, 100cqh);
    aspect-ratio: 1;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 1 auto;
  }

  @container (min-width: 1px) {
    .ringWrap {
      width: min(calc(100cqw - 10px), calc(100cqh - 10px));
    }
  }

  .ringWrap svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg) scaleX(-1);
    overflow: visible;
  }

  .ringCenter {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    width: 78%;
    text-align: center;
    gap: 6px;
  }

  .time {
    margin: 0;
    font-size: clamp(3rem, 30cqw, 16rem);
    line-height: 0.95;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--time-color);
    font-variant-numeric: tabular-nums;
    text-align: center;
    transition: color 0.3s ease;
    white-space: nowrap;
  }

  .time.warn { color: var(--red); }

  .meta {
    font-size: clamp(0.62rem, 2.0cqw, 1.0rem);
    letter-spacing: 0.08em;
    color: #4d8de8;
    text-align: center;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    line-height: 1.2;
    white-space: nowrap;
  }
  body.dark .meta { color: rgba(255,255,255,0.72); }
  .meta strong { color: #6aaaf5; letter-spacing: 0.08em; }
  body.dark .meta strong { color: #ffffff; }

  /* ===== CONTROLS ===== */
  .controls {
    grid-area: controls;
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 12px;
  }

  button {
    border: none;
    border-radius: 14px;
    padding: 12px 14px;
    font: inherit;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    touch-action: manipulation;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  /* Green START button with raised edge */
  .primary {
    background: linear-gradient(180deg, #2eaa3a 0%, #1e8c2c 60%, #166222 100%);
    color: #fff;
    font-size: clamp(0.88rem, 2.4vw, 1.05rem);
    letter-spacing: 0.18em;
    box-shadow: 0 5px 0 #0e4a18, 0 8px 22px rgba(20,120,40,0.50);
  }
  .primary::before { content: "▶"; font-size: 1.1em; }
  .primary.pause {
    background: linear-gradient(180deg, #e84040 0%, #cc2a2a 60%, #a82020 100%);
    box-shadow: 0 5px 0 #6a1010, 0 8px 22px rgba(180,30,30,0.50);
  }
  .primary.pause::before { content: "⏸"; }

  /* White RESET button */
  .secondary {
    background: linear-gradient(180deg, #f5f8ff 0%, #dce8ff 100%);
    color: #0d2654;
    border: 1.5px solid rgba(50,90,190,0.18);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    box-shadow: 0 5px 0 #8099cc, 0 8px 18px rgba(0,0,0,0.28);
  }
  .secondary::before { content: "↻"; font-size: 1.3em; font-weight: 900; }

  body.dark .secondary {
    background: rgba(255,255,255,0.08);
    color: #ffffff;
    border-color: rgba(255,255,255,0.12);
    box-shadow: 0 5px 0 rgba(0,0,0,0.4), 0 8px 18px rgba(0,0,0,0.35);
  }

  @media (max-width: 420px) {
    .app { gap: 8px; padding: 10px; }
    .header { gap: 10px; grid-template-columns: auto 1fr auto; }
    .logoBox { width: 48px; height: 48px; }
    .brandSub { letter-spacing: 0.22em; margin-top: 6px; }
    .themeToggle { padding: 7px 12px 7px 10px; min-height: 36px; font-size: 0.68rem; }
    .quarters { padding-top: 4px; }
    .half { padding: 0 6px 0; }
    .qrow { gap: 10px; }
    .controls { gap: 10px; }
    button { min-height: 50px; padding: 10px 10px; border-radius: 12px; }
    .timer { border-radius: 24px; }
  }

  @media (orientation: landscape) and (min-width: 760px) {
    .app {
      grid-template-columns: minmax(290px, 38%) minmax(0, 1fr);
      grid-template-rows: auto 1fr auto;
      grid-template-areas: 'header timer' 'quarters timer' 'controls timer';
      align-items: stretch;
      gap: 14px 18px;
      overflow: hidden;
    }
    .header { align-self: start; gap: 10px; grid-template-columns: auto 1fr auto; min-width: 0; }
    .logoBox { width: clamp(52px, 8vw, 72px); height: clamp(52px, 8vw, 72px); }
    .brandTitle { font-size: clamp(1rem, 2.8vw, 1.6rem); letter-spacing: 0.16em; }
    .brandSub { font-size: clamp(0.56rem, 1.4vw, 0.82rem); letter-spacing: 0.22em; margin-top: 5px; }
    .quarters { align-self: start; padding-top: 4px; min-width: 0; }
    .half { padding: 0 4px 0; }
    .halfTitle { font-size: clamp(0.72rem, 1.6vw, 0.98rem); letter-spacing: 0.12em; }
    .qrow { gap: 10px; }
    .qbtn { width: clamp(52px, 7vw, 76px); height: clamp(52px, 7vw, 76px); font-size: clamp(0.92rem, 1.8vw, 1.24rem); }
    .timer { min-height: 0; padding: 12px; }
    .time { font-size: clamp(2.4rem, 28cqw, 14rem); }
    .controls { align-self: end; }
  }
</style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="logoBox" aria-label="Gooische Hockey Club logo">
        <img id="ghcLogo" alt="Gooische Hockey Club Bussum" />
      </div>
      <div class="brandText">
        <h1 class="brandTitle">HC Gooische</h1>
        <div class="brandSub">Wedstrijdtimer</div>
      </div>
      <button id="themeToggle" class="themeToggle" type="button" aria-label="Wissel licht of donker modus">Dark</button>
    </header>

    <section class="quarters" aria-label="Kwarten">
      <div class="half">
        <div class="halfTitle">Eerste helft<span class="ul"></span></div>
        <div class="qrow">
          <button class="qbtn" data-q="1" type="button">Q1</button>
          <button class="qbtn" data-q="2" type="button">Q2</button>
        </div>
      </div>
      <div class="half">
        <div class="halfTitle">Tweede helft<span class="ul"></span></div>
        <div class="qrow">
          <button class="qbtn" data-q="3" type="button">Q3</button>
          <button class="qbtn" data-q="4" type="button">Q4</button>
        </div>
      </div>
    </section>

    <section class="timer" aria-label="Timer">
      <div class="timerInner">
        <div class="ringWrap">
          <!-- SVG ring drawn by JS -->
          <svg id="ringSvg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Gradient defs -->
            <defs>
              <radialGradient id="glowRed" cx="50%" cy="50%" r="50%">
                <stop offset="70%" stop-color="#cc2020" stop-opacity="0"/>
                <stop offset="100%" stop-color="#ff4040" stop-opacity="0.18"/>
              </radialGradient>
            </defs>
            <!-- tick marks group -->
            <g id="ringTicks"></g>
            <!-- dark track (full circle background) -->
            <circle id="ringTrack" cx="100" cy="100" r="88" fill="none" stroke-width="13.5" />
            <!-- BLUE arc = remaining time (shrinks as time passes) -->
            <circle id="ringArc" cx="100" cy="100" r="88" fill="none" stroke-width="13.5"
              stroke-linecap="butt" />
            <!-- RED arc = elapsed time (grows as time passes) -->
            <circle id="ringElapsed" cx="100" cy="100" r="88" fill="none" stroke-width="13.5"
              stroke-linecap="butt" />
            <!-- warning arc (last minute highlight) — kept for JS compat -->
            <circle id="ringWarnArc" cx="100" cy="100" r="88" fill="none" stroke-width="13.5"
              stroke-linecap="round" style="opacity:0;" />
            <!-- Glow dot at the red/blue junction -->
            <circle id="ringGlow" cx="100" cy="12" r="8" fill="rgba(255,180,120,0.85)"
              style="filter:blur(3px); display:none;" />
          </svg>
          <div class="ringCenter">
            <div id="time" class="time">00:00</div>
            <div id="meta" class="meta">Gespeeld: <strong>00:00</strong> / 70:00</div>
          </div>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="Bediening">
      <button id="start" class="primary" type="button">Start</button>
      <button id="reset" class="secondary" type="button" style="font-size:0.72rem;">Reset kwart</button>
    </section>
  </main>

  <script>

    // ---- Constants ----
    const QLEN = 17 * 60 + 30;  // seconds per quarter
    const Q2Q4OFFSET = QLEN;
    const TOTAL_MATCH = QLEN * 4;
    const WARN_SECONDS = 60; // last-minute warning

    // ---- Elements ----
    const timeEl = document.getElementById('time');
    const metaEl = document.getElementById('meta');
    const startBtn = document.getElementById('start');
    const resetBtn = document.getElementById('reset');
    const themeToggle = document.getElementById('themeToggle');
    const qButtons = Array.from(document.querySelectorAll('.qbtn'));

    // Ring SVG elements
    const ringTrack = document.getElementById('ringTrack');
    const ringArc = document.getElementById('ringArc');
    const ringWarnArc = document.getElementById('ringWarnArc');
    const ringTicks = document.getElementById('ringTicks');

    // ---- State ----
    let audioCtx = null;
    let wakeLock = null;
    const lastMinuteBeeped = { 1: false, 2: false, 3: false, 4: false };

    let currentQuarter = 1;
    let quarterTimes = { 1: 0, 2: 0, 3: 0, 4: 0 };
    let running = false;
    let lastTs = null;
    let rafId = null;
    let runStartedAt = null;
    let runBaseElapsed = 0;

    // ---- Ring geometry ----
    const R = 88;
    const CX = 100, CY = 100;
    const CIRCUMFERENCE = 2 * Math.PI * R;

    (function buildTicks() {
      // Tick marks removed
    })();

    function updateRingColors() {
      const isDark = document.body.classList.contains('dark');
      const trackColor  = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(10,30,80,0.18)';
      const blueColor   = isDark ? '#4a8fff' : '#3a78e8';
      const redColor    = isDark ? '#e15b4f' : '#e03030';
      const tickColor   = isDark ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.35)';

      ringTrack.setAttribute('stroke', trackColor);
      Array.from(ringTicks.children).forEach(l => l.setAttribute('stroke', tickColor));

      // Store colours for use in updateRingArc
      ringArc._blueColor   = blueColor;
      ringArc._redColor    = redColor;
      ringWarnArc.setAttribute('stroke', redColor);
    }

    function updateRingArc(elapsedSeconds) {
      const blueColor  = ringArc._blueColor  || '#3a78e8';
      const redColor   = ringArc._redColor   || '#e03030';

      // Clamp fractions
      const elapsedFrac  = Math.max(0, Math.min(1, elapsedSeconds / QLEN));
      const remainFrac   = 1 - elapsedFrac;

      const elapsedLen = elapsedFrac  * CIRCUMFERENCE;
      const remainLen  = remainFrac   * CIRCUMFERENCE;

      // --- BLUE arc: remaining time ---
      // Starts full, shrinks clockwise. We draw it from the "top" (offset 0)
      // but offset by elapsedLen so it starts after the red part.
      ringArc.setAttribute('stroke', blueColor);
      ringArc.setAttribute('stroke-dasharray', remainLen + ' ' + CIRCUMFERENCE);
      ringArc.setAttribute('stroke-dashoffset', -elapsedLen);

      // --- RED arc: elapsed time ---
      // Starts at 0, grows clockwise from the top.
      const ringElapsed = document.getElementById('ringElapsed');
      ringElapsed.setAttribute('stroke', redColor);
      ringElapsed.setAttribute('stroke-dasharray', elapsedLen + ' ' + CIRCUMFERENCE);
      ringElapsed.setAttribute('stroke-dashoffset', '0');

      // Add a bright glow on the leading edge of the red arc
      // (achieved via filter in CSS — no extra JS needed)

      // Keep warn arc hidden (compat)
      ringWarnArc.style.opacity = '0';

      // Move glow dot to the junction (end of red arc = start of blue arc)
      const glowDot = document.getElementById('ringGlow');
      if (elapsedFrac > 0.005 && elapsedFrac < 0.998) {
        const angle = elapsedFrac * 2 * Math.PI; // 0 = top, clockwise
        const gx = CX - R * Math.sin(angle);
        const gy = CY - R * Math.cos(angle);
        glowDot.setAttribute('cx', gx);
        glowDot.setAttribute('cy', gy);
        glowDot.style.display = '';
      } else {
        glowDot.style.display = 'none';
      }
    }

    // ---- Helpers ----
    function quarterElapsed(q) { return quarterTimes[q]; }
    function setQuarterElapsed(q, val) { quarterTimes[q] = Math.max(0, val); }
    function resetBeepState(q) { lastMinuteBeeped[q] = false; }

    function ensureAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (err) {}
    }

    function beepLastMinute() {
      try {
        ensureAudio();
        if (!audioCtx) return;
        // Three-tone alert beep (louder)
        const now = audioCtx.currentTime;
        [0, 0.25, 0.50].forEach((delay, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = i === 0 ? 880 : i === 1 ? 1046 : 1318;
          gain.gain.setValueAtTime(0.0001, now + delay);
          gain.gain.exponentialRampToValueAtTime(0.35, now + delay + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + delay + 0.22);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now + delay);
          osc.stop(now + delay + 0.25);
        });
      } catch (err) {}
    }

    function fmt(seconds) {
      seconds = Math.max(0, Math.floor(seconds));
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function displayValue(q) {
      const e = quarterElapsed(q);
      return (q === 2 || q === 4) ? e + Q2Q4OFFSET : e;
    }

    function updateButtons() {
      qButtons.forEach(btn => btn.classList.toggle('active', Number(btn.dataset.q) === currentQuarter));
    }

    function updateWarning() {
      const warn = quarterElapsed(currentQuarter) >= (QLEN - WARN_SECONDS);
      timeEl.classList.toggle('warn', warn);
    }

    function totalElapsedMatch() {
      return quarterTimes[1] + quarterTimes[2] + quarterTimes[3] + quarterTimes[4];
    }

    function updateUI() {
      const elapsedQuarter = quarterElapsed(currentQuarter);
      const display = displayValue(currentQuarter);
      const totalElapsed = totalElapsedMatch();

      timeEl.textContent = fmt(display);
      metaEl.innerHTML = 'Gespeeld: <strong>' + fmt(totalElapsed) + '</strong> / ' + fmt(TOTAL_MATCH);
      updateButtons();
      updateWarning();
      updateRingArc(elapsedQuarter);

      startBtn.textContent = running ? 'Pauze' : 'Start';
      startBtn.classList.toggle('pause', running);
    }

    async function requestWakeLock() {
      try {
        if (!('wakeLock' in navigator)) return;
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
      } catch (err) { wakeLock = null; }
    }

    async function releaseWakeLock() {
      try {
        if (wakeLock) { await wakeLock.release(); wakeLock = null; }
      } catch (err) {}
    }

    function syncRunningTime() {
      if (!running || runStartedAt == null) return;
      const nowElapsed = runBaseElapsed + ((Date.now() - runStartedAt) / 1000);
      setQuarterElapsed(currentQuarter, nowElapsed);
    }

    function stopTimer() {
      syncRunningTime();
      running = false;
      lastTs = null;
      runStartedAt = null;
      runBaseElapsed = 0;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      releaseWakeLock();
      updateUI();
    }

    function tick() {
      if (!running) return;

      const prev = quarterElapsed(currentQuarter);
      syncRunningTime();
      const nowElapsed = quarterElapsed(currentQuarter);

      // Last-minute beep trigger. De timer loopt na 17:30 gewoon door.
      if (!lastMinuteBeeped[currentQuarter] && prev < (QLEN - WARN_SECONDS) && nowElapsed >= (QLEN - WARN_SECONDS)) {
        lastMinuteBeeped[currentQuarter] = true;
        beepLastMinute();
      }

      updateUI();
      rafId = requestAnimationFrame(tick);
    }

    async function startTimer() {
      if (running) return;
      running = true;
      lastTs = null;
      runBaseElapsed = quarterElapsed(currentQuarter);
      runStartedAt = Date.now();
      ensureAudio();
      await requestWakeLock();
      rafId = requestAnimationFrame(tick);
      updateUI();
    }

    function toggleStartPause() { if (running) stopTimer(); else startTimer(); }

    function resetCurrentQuarter() {
      running = false;
      lastTs = null;
      runStartedAt = null;
      runBaseElapsed = 0;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      releaseWakeLock();
      setQuarterElapsed(currentQuarter, 0);
      resetBeepState(currentQuarter);
      updateUI();
    }

    function changeQuarter(q) {
      stopTimer();
      currentQuarter = q;
      updateUI();
      if ('vibrate' in navigator) navigator.vibrate(10);
    }

    function applyTheme(mode) {
      document.body.classList.toggle('dark', mode === 'dark');
      localStorage.setItem('ghc-theme', mode);
      themeToggle.textContent = mode === 'dark' ? 'Light' : 'Dark';
      updateRingColors();
      updateUI();
    }

    function initTheme() {
      const saved = localStorage.getItem('ghc-theme');
      if (saved === 'dark' || saved === 'light') applyTheme(saved);
      else applyTheme((window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
    }

    startBtn.addEventListener('click', toggleStartPause);
    resetBtn.addEventListener('click', resetCurrentQuarter);
    themeToggle.addEventListener('click', () => applyTheme(document.body.classList.contains('dark') ? 'light' : 'dark'));
    qButtons.forEach(btn => btn.addEventListener('click', () => changeQuarter(Number(btn.dataset.q))));

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && running) {
        syncRunningTime();
        requestWakeLock();
        updateUI();
        if (!rafId) rafId = requestAnimationFrame(tick);
      }
    });

    window.addEventListener('pageshow', () => {
      if (running) {
        syncRunningTime();
        updateUI();
        if (!rafId) rafId = requestAnimationFrame(tick);
      }
    });

    initTheme();
    updateUI();
  </script>
</body>
</html>
